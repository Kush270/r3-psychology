<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results | R3 Psychology</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area">
            <span class="logo-r3">R3</span>
            <span class="logo-text">Psychology</span>
        </div>
       <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#services">Services</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="psychoeducation.html">Psychoeducation</a></li>
            <li><a href="psychometrics.html">Psychometrics</a></li>
            <li><a href="blog.html">Blog</a></li>
        </ul>
    </nav>

    <main class="content">
        <section class="results-container">
            <div class="result-card">
                <header class="result-header">
                    <h1 id="testName">Assessment Result</h1>
                    <p id="resultDate" class="date-tag"></p>
                </header>

                <div id="visualDisplay" class="visual-display">
                    </div>

                <div class="interpretation-box">
                    <h3>What this means</h3>
                    <p id="interpretationText">No results found. Please complete an assessment first.</p>
                </div>

                <div class="action-footer">
                    <button id="copyBtn" class="btn-submit">Copy Results to Clipboard</button>
                    <p id="copyFeedback" class="copy-feedback">Copied to clipboard!</p>
                </div>
            </div>
            
            <a href="psychometrics.html" class="back-link">← Back to Assessments</a>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const data = JSON.parse(localStorage.getItem('lastResult'));
            const display = document.getElementById('visualDisplay');
            const dateTag = document.getElementById('resultDate');
            
            if (!data) return;

            // Set basic info
            document.getElementById('testName').innerText = data.testName;
            document.getElementById('interpretationText').innerText = data.interpretation;
            dateTag.innerText = new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });

            // Handle DASS-21 (Multi-score) vs others (Single-score)
            if (data.testName === "DASS-21") {
                // Split the score string "D:10 A:12 S:14" into parts
                const scores = data.score.split(' ');
                display.classList.add('multi-grid');
                display.innerHTML = scores.map(s => {
                    const [label, val] = s.split(':');
                    const fullLabel = label === 'D' ? 'Depression' : label === 'A' ? 'Anxiety' : 'Stress';
                    return `
                        <div class="score-item">
                            <div class="score-circle"><span>${val}</span></div>
                            <span class="score-label">${fullLabel}</span>
                        </div>
                    `;
                }).join('');
            } else {
                // Single score for K10 or PCL-5
                display.innerHTML = `
                    <div class="score-item">
                        <div class="score-circle"><span>${data.score}</span></div>
                        <span class="score-label">Total Score</span>
                    </div>
                `;
            }

            // Copy to Clipboard Logic
            document.getElementById('copyBtn').addEventListener('click', () => {
                const resultText = `
R3 Psychology Assessment
-------------------------
Test: ${data.testName}
Date: ${dateTag.innerText}
Results: ${data.score}
Interpretation: ${data.interpretation}
-------------------------
                `.trim();

                navigator.clipboard.writeText(resultText).then(() => {
                    const feedback = document.getElementById('copyFeedback');
                    feedback.classList.add('show');
                    setTimeout(() => feedback.classList.remove('show'), 2000);
                });
            });
        });
    </script>

    <style>
        .results-container { padding: 80px 10%; display: flex; flex-direction: column; align-items: center; }
        .result-card { background: white; width: 100%; max-width: 700px; padding: 60px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; }
        .date-tag { font-size: 0.85rem; color: #888; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .visual-display { margin: 40px 0; display: flex; justify-content: center; gap: 30px; }
        .multi-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; }
        
        .score-item { display: flex; flex-direction: column; align-items: center; }
        .score-circle { 
            width: 100px; height: 100px; border: 4px solid var(--accent-olive); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; margin-bottom: 10px;
            background: var(--site-bg);
        }
        .score-circle span { font-family: var(--font-serif); font-size: 1.8rem; font-weight: 700; color: var(--text-heading); }
        .score-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-olive); font-weight: 600; }
        
        .interpretation-box { background: var(--site-bg); padding: 30px; border-radius: 8px; margin-bottom: 40px; text-align: left; border-left: 4px solid var(--accent-mauve); }
        .interpretation-box h3 { margin-bottom: 10px; font-size: 1.1rem; }
        .interpretation-box p { font-size: 1rem; line-height: 1.6; }
        
        .action-footer { position: relative; }
        .copy-feedback { position: absolute; width: 100%; bottom: -30px; left: 0; opacity: 0; transition: 0.3s; color: var(--accent-olive); font-weight: 600; font-size: 0.9rem; }
        .copy-feedback.show { opacity: 1; bottom: -40px; }
        
        .back-link { margin-top: 30px; text-decoration: none; color: #888; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: var(--text-heading); }

        @media (max-width: 600px) {
            .multi-grid { grid-template-columns: 1fr; gap: 20px; }
            .result-card { padding: 30px; }
        }
    </style>
</body>
</html>
