<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCL-5 Assessment | R3 Psychology</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <span class="logo-r3">R3</span>
                <span class="logo-text">Psychology</span>
            </div>
            <div class="mobile-toggle" id="mobile-menu-btn">
                <span></span><span></span><span></span>
            </div>
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="psychoeducation.html">Psychoeducation</a></li>
            <li><a href="psychometrics.html" class="active">Psychometrics</a></li>
            <li><a href="blog.html">Blog</a></li>
        </ul>
        <div class="nav-footer">
            <a href="index.html#contact" class="cta-sidebar">Get Started</a>
        </div>
    </nav>

    <main class="content">
        <section class="page-header">
            <h1>PCL-5 Assessment</h1>
            <p class="sub-headline">Below is a list of problems that people sometimes have in response to a very stressful experience. Please indicate how much you have been <strong>bothered by these problems in the past month.</strong></p>
        </section>

        <section class="test-container">
            <form id="pclForm">
                <div id="questions-wrapper">
                    </div>

                <div class="form-footer" style="text-align: center; padding: 40px 0;">
                    <button type="submit" class="btn-primary">Calculate My Results</button>
                </div>
            </form>
        </section>
    </main>

    <script>
        const questions = [
            "Repeated, disturbing, and unwanted memories of the stressful experience?",
            "Repeated, disturbing dreams of the stressful experience?",
            "Suddenly feeling or acting as if the stressful experience were actually happening again?",
            "Feeling very upset when something reminded you of the stressful experience?",
            "Having strong physical reactions when something reminded you of the stressful experience?",
            "Avoiding memories, thoughts, or feelings related to the stressful experience?",
            "Avoiding external reminders of the stressful experience (people, places, etc.)?",
            "Trouble remembering important parts of the stressful experience?",
            "Having strong negative beliefs about yourself, other people, or the world?",
            "Blaming yourself or someone else for the stressful experience or what happened after?",
            "Having strong negative feelings such as fear, horror, anger, guilt, or shame?",
            "Loss of interest in activities that you used to enjoy?",
            "Feeling distant or cut off from other people?",
            "Trouble experiencing positive feelings (e.g., unable to feel happiness or love)?",
            "Irritable behavior, feeling angry, or acting aggressively?",
            "Taking too many risks or doing things that could cause you harm?",
            "Being “superalert” or watchful or on guard?",
            "Feeling jumpy or easily startled?",
            "Having difficulty concentrating?",
            "Trouble falling or staying asleep?"
        ];

        const scaleDescriptions = [
            "Not at all",
            "A little bit",
            "Moderately",
            "Quite a bit",
            "Extremely"
        ];

        const wrapper = document.getElementById('questions-wrapper');
        
        // Inject 20 questions
        questions.forEach((q, index) => {
            const qNum = index + 1;
            let optionsHTML = '';
            
            scaleDescriptions.forEach((desc, val) => {
                optionsHTML += `
                    <label class="option-label">
                        <input type="radio" name="q${qNum}" value="${val}" required>
                        <span class="option-content">
                            <span class="option-number">${val}</span>
                            <span class="option-text">${desc}</span>
                        </span>
                    </label>
                `;
            });

            wrapper.innerHTML += `
                <div class="q-block">
                    <p class="q-text"><strong>${qNum}.</strong> ${q}</p>
                    <div class="options-vertical">
                        ${optionsHTML}
                    </div>
                </div>
            `;
        });

        // Mobile Menu Toggle
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navLinks = document.getElementById('nav-links');
        menuBtn.addEventListener('click', () => { navLinks.classList.toggle('active'); });

        // Scoring Logic
        document.getElementById('pclForm').onsubmit = function(e) {
            e.preventDefault();
            const data = new FormData(this);
            let total = 0;

            for (let value of data.values()) {
                total += parseInt(value);
            }

            // PCL-5 Threshold is typically 31-33
            let interpretation = "";
            if (total < 33) {
                interpretation = "Your score is below the typical clinical threshold for PTSD. However, if these symptoms cause distress, professional consultation is recommended.";
            } else {
                interpretation = "Your score is above the clinical threshold (33), suggestive of probable PTSD. We recommend discussing this with a professional.";
            }

            localStorage.setItem('lastResult', JSON.stringify({
                testName: "PCL-5 Assessment",
                score: total,
                interpretation: interpretation
            }));

            window.location.href = 'results.html';
        };
    </script>

    <style>
        .options-vertical {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 8px;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .option-label:hover {
            background-color: var(--site-bg);
        }

        .option-label input[type="radio"] {
            accent-color: var(--accent-sage);
            width: 18px;
            height: 18px;
        }

        .option-content {
            display: flex;
            gap: 10px;
        }

        .option-number {
            font-weight: 700;
            color: var(--text-heading);
            min-width: 15px;
        }

        .option-text {
            font-size: 0.95rem;
            color: #555;
        }

        /* Selection highlight */
        .option-label:has(input:checked) {
            background-color: rgba(137, 158, 144, 0.1);
            border-color: var(--accent-sage);
        }

        /* Adjusting layout for 20 questions to ensure it's not overwhelming */
        .q-block {
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
    </style>
</body>
</html>
